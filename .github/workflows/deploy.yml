# Builds the game and publishes it to GitHub Pages.
#
# NOTE: GitHub Actions only runs workflows found at the REPOSITORY ROOT under
# `.github/workflows/`. This file assumes city-builder is (or has become) its own
# repository — see MIGRATION.md. While the project lives inside a subdirectory of
# another repo, this workflow will NOT auto-run; move it to that repo's root (and
# add a `working-directory: city-builder` default) if you want it to.
#
# One-time setup: Settings → Pages → Source → "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
